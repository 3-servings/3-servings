server {
    listen 80;

    server_name api.threeservings.site;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;

    server_name api.threeservings.site;

    ssl_certificate     /etc/letsencrypt/live/threeservings.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/threeservings.site/privkey.pem;

    location / {
        proxy_pass http://spring:19096;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}