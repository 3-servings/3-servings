spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

cloud:
  aws:
    region: ${AWS_REGION}
    auth: profile
    profile: default
    s3:
      bucket: ${S3_BUCKET_NAME}


jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000     # 30분
  refresh-expiration: 1209600000 # 14일

toss:
  secret-key: ${TOSS_SECRET_KEY}