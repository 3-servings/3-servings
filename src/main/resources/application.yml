spring:
  application:
    name: three-servings-api

  # local 환경 실행 기분
  profiles:
    default: local

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: 19096

logging:
  level:
    root: info
  pattern:
    # %X{키:-기본값} : MDC 값, 없으면 기본값. 비로그인 요청과 기동 로그는 anon 으로 찍힌다.
    # MDC 주입 위치: traceId -> RequestLoggingFilter
    #                userId/username -> JwtAuthorizationFilter(인증 요청), JwtAuthenticationFilter(로그인), UserService.signup(회원가입)
    console: "%d{HH:mm:ss.SSS} [%X{traceId:-________}] [uid:%X{userId:-anon}] [user:%X{username:-anon}] %-5level %logger{0} - %msg%n"

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000     # 30분
  refresh-expiration: 1209600000 # 14일

cloud:
  aws:
    region: ${AWS_REGION}
    s3:
      bucket: ${S3_BUCKET_NAME}
      base-url: ${CLOUD_FRONT_DOMAIN}