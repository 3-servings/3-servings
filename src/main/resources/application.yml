logging:
  level:
    root: info
  pattern:
    # %X{traceId:-} : MDC의 traceId, 없으면 빈칸 Spring Boot 표준 user추가 되면 이것도 중간에 넣기 ->  [%X{userId}]
    console: "%d{HH:mm:ss.SSS} [%X{traceId:-________}] %-5level %logger{15} - %msg%n"

server:
  port: 19096

jwt:
  secret: ${JWT_SECRET:}
  access-expiration: 1800000     # 30분
  refresh-expiration: 1209600000 # 14일

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update          # 팀/운영은 validate + Flyway 권장
    properties:
      hibernate:
        format_sql: true
    open-in-view: false